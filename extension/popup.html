<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bibliarium</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <!-- Not authenticated -->
    <div id="authGate" class="screen hidden">
      <div class="brand">Bibliarium</div>
      <p class="hint">Connect your account to save links to your board.</p>
      <button type="button" id="openConnect" class="btn primary full">Connect account</button>
    </div>

    <!-- Main save screen -->
    <div id="main" class="screen hidden">
      <div id="pageInfo" class="page-info">
        <img id="fav" class="fav" alt="" width="16" height="16" hidden />
        <div class="page-text">
          <span id="pageTitle" class="page-title">Loading…</span>
          <span id="pageUrl" class="page-url"></span>
        </div>
      </div>

      <button type="button" id="saveBtn" class="btn primary full">
        <span id="saveBtnLabel">Save to Bibliarium</span>
      </button>

      <p id="msg" class="msg hidden"></p>
    </div>

    <script src="api.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
