<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bibliarium — extension settings</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 520px;
        margin: 0 auto;
        padding: 36px 24px 56px;
        color: #141414;
        background: #ffffff;
      }
      h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; }
      .sub { color: #666; font-size: 13px; margin-bottom: 28px; line-height: 1.5; }
      label { display: block; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 6px; margin-top: 20px; }
      input, textarea {
        width: 100%; padding: 10px 12px;
        border: 1.5px solid #e0e0e0; border-radius: 10px;
        font: 13px/1.4 ui-monospace, monospace;
        background: #fafafa; color: #141414;
        outline: none; transition: border-color 0.15s;
      }
      input:focus, textarea:focus { border-color: #141414; background: #fff; }
      textarea { min-height: 110px; resize: vertical; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; }
      .btn {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 9px 16px; border-radius: 10px;
        font: 600 13px/1 inherit; cursor: pointer; border: 1.5px solid #e0e0e0;
        background: #141414; color: #fff; transition: opacity 0.12s;
      }
      .btn:active { opacity: 0.8; }
      .btn.ghost { background: #fff; color: #141414; }
      #status { margin-top: 14px; font-size: 13px; min-height: 18px; }
      .ok { color: #1a7f37; }
      .err { color: #b42318; }
      .hint { margin-top: 24px; padding: 14px 16px; border-radius: 10px; background: #f5f5f5; font-size: 12px; color: #555; line-height: 1.6; }
      .hint b { color: #141414; }
    </style>
  </head>
  <body>
    <h1>Bibliarium</h1>
    <p class="sub">Connect the extension to your account in two steps.</p>

    <label for="baseUrl">App URL</label>
    <input id="baseUrl" type="url" placeholder="https://bibliarium.vercel.app" />

    <label for="session">Session JSON</label>
    <textarea id="session" placeholder='{"access_token":"…","refresh_token":"…","expires_at":…}'></textarea>

    <div class="actions">
      <button type="button" id="save" class="btn">Save</button>
      <button type="button" id="openConnect" class="btn ghost">Open connect page</button>
    </div>

    <p id="status"></p>

    <div class="hint">
      <b>How to connect:</b><br>
      1. Make sure the App URL above is <b>https://bibliarium.vercel.app</b><br>
      2. Click <b>Open connect page</b> → copy the JSON shown there<br>
      3. Paste it in the Session JSON field → click <b>Save</b>
    </div>

    <script src="api.js"></script>
    <script src="options.js"></script>
  </body>
</html>
